<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XAU/USD | Hız Düellosu</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --blue-bright: #00d2ff;
            --bg-dark: #020817;
            --accent: #00f2fe;
            --red: #ff4b2b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body {
            font-family: 'Sora', sans-serif;
            background: radial-gradient(circle at center, #1e40af 0%, #020817 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        .screen { width: 100%; max-width: 400px; }
        .hidden { display: none; }

        .battle-circle {
            width: 200px; height: 200px; border-radius: 50%;
            border: 4px solid var(--blue-bright);
            display: flex; align-items: center; justify-content: center;
            margin: 40px auto; position: relative;
            cursor: pointer; transition: 0.2s;
            background: rgba(0, 210, 255, 0.05);
        }
        .battle-circle.active { background: var(--blue-bright); box-shadow: 0 0 50px var(--blue-bright); border-color: #fff; }
        .battle-circle.too-early { background: var(--red); border-color: var(--red); }
        
        .timer-display { font-size: 48px; font-weight: 800; margin-bottom: 10px; color: var(--blue-bright); }
        
        .main-cta {
            width: 100%; padding: 20px; background: linear-gradient(to right, #00d2ff, #3b82f6);
            color: #fff; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase;
            font-size: 16px; letter-spacing: 1px; cursor: pointer;
        }

        @media (min-width: 769px) {
            body::after {
                content: 'Lütfen mobil cihazdan görüntüleyin.';
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: var(--bg-dark); color: var(--blue-bright); display: flex; align-items: center; justify-content: center;
                z-index: 9999;
            }
        }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1 style="font-size:32px; font-weight:800;">SEN Mİ HIZLISIN,<br><b style="color:var(--blue-bright)">ROBOT MU?</b></h1>
        <p style="margin:20px 0; opacity:0.7;">Daire <b>MAVİ</b> olduğunda dokun. Tepki süreni ölçelim.</p>
        <button class="main-cta" onclick="startTest()">TESTİ BAŞLAT</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="status-text" style="font-size:18px; font-weight:600; min-height:27px;">HAZIR OL...</div>
        <div id="target" class="battle-circle" onclick="handleClick()">
            <span id="target-label" style="font-weight:800; font-size:24px;">BEKLE</span>
        </div>
        <p id="hint">Mavi olunca dokun!</p>
    </div>

    <div id="result-screen" class="screen hidden animate__animated animate__fadeIn">
        <div class="timer-display" id="user-time">0 ms</div>
        <p style="margin-bottom:30px;">Senin tepki süren.</p>
        
        <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; border:1px solid var(--blue-bright); margin-bottom:30px;">
            <p style="font-size:14px; margin-bottom:10px;">Robotumuz bu sürede tam</p>
            <h2 id="trade-count" style="font-size:36px; color:var(--accent); font-weight:800;">0 İŞLEM</h2>
            <p style="font-size:14px; margin-top:10px;">gerçekleştirdi.</p>
        </div>

        <button class="main-cta" onclick="window.location.href='https://cliprs.github.io/sunumrobot'">KEŞFET</button>
    </div>

    <script>
        let startTime, timeout;
        let isWaiting = false;

        function startTest() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            prepare();
        }

        function prepare() {
            isWaiting = true;
            document.getElementById('target').className = 'battle-circle';
            document.getElementById('target-label').innerText = 'BEKLE';
            document.getElementById('status-text').innerText = 'HAZIR OL...';
            
            const delay = Math.floor(Math.random() * 3000) + 2000;
            timeout = setTimeout(() => {
                isWaiting = false;
                document.getElementById('target').classList.add('active');
                document.getElementById('target-label').innerText = 'DOKUN!';
                document.getElementById('status-text').innerText = 'ŞİMDİ!';
                startTime = Date.now();
            }, delay);
        }

        function handleClick() {
            if (isWaiting) {
                clearTimeout(timeout);
                document.getElementById('target').classList.add('too-early');
                document.getElementById('status-text').innerText = 'ÇOK ERKEN!';
                setTimeout(prepare, 1000);
            } else if (startTime) {
                const endTime = Date.now();
                const reactionTime = endTime - startTime;
                showResult(reactionTime);
            }
        }

        function showResult(ms) {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('user-time').innerText = ms + ' ms';
            document.getElementById('trade-count').innerText = Math.floor(ms / 15) + ' İŞLEM';
        }
    </script>
</body>
</html>
