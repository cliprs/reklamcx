<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XAU/USD | Grafik Avcısı</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --blue-bright: #00d2ff;
            --bg-dark: #020817;
            --accent: #00f2fe;
            --green: #00ff88;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        .screen { width: 100%; max-width: 400px; }
        .hidden { display: none; }

        /* Chart Animation Area */
        .chart-area {
            width: 100%; height: 250px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            position: relative;
            margin: 30px 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .candle {
            width: 40px; background: var(--green);
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%);
            border-radius: 5px 5px 0 0;
            /* Glow removed */
        }
        
        .candle.frozen { background: #fff; box-shadow: 0 0 15px #fff; }

        .main-cta {
            width: 100%; padding: 20px; background: linear-gradient(to right, #00d2ff, #3b82f6);
            color: #fff; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase;
            font-size: 16px; letter-spacing: 1px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1 style="font-size:32px; font-weight:800;">ZİRVEYİ<br><b style="color:var(--blue-bright)">YAKALA!</b></h1>
        <p style="margin:20px 0; opacity:0.7;">Fiyat en tepeye ulaştığında <b>SAT</b> butonuna bas. Maksimum kârı hedefle!</p>
        <button class="main-cta" onclick="startHunt()">AVI BAŞLAT</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="chart-area">
            <div class="target-line"></div>
            <div id="candle" class="candle" style="height: 10%;"></div>
        </div>
        <button id="sell-btn" class="main-cta" style="background: #ff4b2b;" onclick="catchPeak()">ŞİMDİ SAT!</button>
    </div>

    <div id="result-screen" class="screen hidden animate__animated animate__fadeIn">
        <h1 id="result-title" style="font-size:32px; font-weight:800;">KAÇIRDIN!</h1>
        <p id="result-desc" style="margin:20px 0; opacity:0.7;">Fiyat zirveden %12 düştükten sonra satabildin.</p>
        
        <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:20px; border:1px solid var(--blue-bright); margin-bottom:30px;">
            <p style="font-size:14px;">Robotumuz ise milisaniyeler içinde tam en yüksek noktadan <b>TP (Kâr Al)</b> yaptı.</p>
        </div>

        <button class="main-cta" onclick="window.location.href='https://cliprs.github.io/sunumrobot'">KEŞFET</button>
    </div>

    <script>
        let height = 10;
        let direction = 1;
        let interval;
        let maxHeight = 0;
        let gameActive = false;

        function startHunt() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            gameActive = true;
            
            interval = setInterval(() => {
                height += (Math.random() * 5 + 2) * direction;
                if (height > 95) direction = -1;
                if (height < 10) direction = 1;
                
                if (height > maxHeight) maxHeight = height;
                document.getElementById('candle').style.height = height + '%';
            }, 30);
        }

        function catchPeak() {
            if(!gameActive) return;
            gameActive = false;
            
            clearInterval(interval);
            const candle = document.getElementById('candle');
            candle.classList.add('frozen'); // Highlight where it stopped
            
            const sellBtn = document.getElementById('sell-btn');
            sellBtn.innerText = "İŞLEM KAPATILDI...";
            sellBtn.style.opacity = "0.5";

            const currentHeight = height;
            const diff = maxHeight - currentHeight;
            
            setTimeout(() => {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                
                if (diff < 4) {
                    document.getElementById('result-title').innerText = "MÜKEMMEL!";
                    document.getElementById('result-desc').innerText = "Neredeyse zirveyi yakaladın! Ama bunu her saniye yapabilir misin?";
                } else {
                    document.getElementById('result-title').innerText = "GEÇ KALDIN!";
                    document.getElementById('result-desc').innerText = `Zirveyi %${Math.floor(diff)} farkla kaçırdın.`;
                }
            }, 1500); // 1.5 second delay to see the result
        }
    </script>
</body>
</html>
